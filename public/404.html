<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>NDE Experts</title>
<script>
  // Single-Page-App fallback for GitHub Pages. GitHub serves this 404.html for
  // any unknown path; we redirect to index.html with the original path encoded
  // in the query string, which the restore script in index.html then unpacks.
  // pathSegmentsToKeep = 1 keeps the repo name (/NDE-Experts) in the base path.
  (function () {
    var pathSegmentsToKeep = 1;
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
      l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  })();
</script>
</head>
<body></body>
</html>
