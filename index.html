<!-- SPA deep-link restore: 404.html redirects unknown paths here with the path
     encoded in the query; this rebuilds the real URL before the app boots. -->
<script>
  (function () {
    var l = window.location;
    if (l.search[1] === '/') {
      var decoded = l.search.slice(1).split('&').map(function (s) {
        return s.replace(/~and~/g, '&');
      }).join('?');
      window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash);
    }
  })();
</script>
